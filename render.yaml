services:
  # ─── Backend API ─────────────────────────────────────────────────────────
  - type: web
    name: vedaai-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false   # set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false   # set manually in Render dashboard
      - key: REDIS_URL
        fromService:
          name: vedaai-redis
          type: redis
          property: connectionString
      - key: FRONTEND_URL
        sync: false   # set to your Vercel frontend URL
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE
        value: "10485760"
    disk:
      name: uploads
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1

  # ─── Redis ────────────────────────────────────────────────────────────────
  - type: redis
    name: vedaai-redis
    ipAllowList: []   # only allow internal connections
    plan: free
    maxmemoryPolicy: noeviction
